name: "Bootstrap Workflow Files"

on:
  workflow_run:
    workflows: ["Vend new Project"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bootstrap:
    name: "Bootstrap Repository Workflows"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout vending machine repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify bootstrap template compatibility
        run: |
          set -e

          test -f modules/repository/templates/tf_action.yaml.tftpl
          test -f modules/repository/templates/dependabot.yml.tftpl
          test -f modules/repository/templates/dependency-submission.yaml.tftpl

          grep -q "actions/reusable_azure_deploy.yml" modules/repository/templates/tf_action.yaml.tftpl
          echo "Bootstrap templates are compatible with current repository layout."

      - name: Bootstrap workflows
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -e

          # Read all project configs
          for config_file in projects/configs/*.yaml; do
            if [ ! -f "$config_file" ]; then
              continue
            fi

            echo "Processing $config_file"

            # Extract repo name using simple parsing
            repo_name=$(grep "^repo_name:" "$config_file" | cut -d'"' -f2 | tr -d "'")

            if [ -z "$repo_name" ]; then
              echo "Warning: Could not extract repo_name from $config_file"
              continue
            fi

            echo "Repository: $repo_name"

            # Check if repo exists
            if ! gh repo view "Egoorbis/$repo_name" >/dev/null 2>&1; then
              echo "Repository Egoorbis/$repo_name does not exist yet, skipping"
              continue
            fi

            # Resolve deterministic update branch from config when present.
            update_branch=$(awk -F': *' '/^update_branch:/{print $2; exit}' "$config_file" | tr -d '"' | tr -d "'")
            if [ -z "$update_branch" ] || [ "$update_branch" = "null" ]; then
              BRANCH_NAME="chore/vending-updates"
            else
              BRANCH_NAME="$update_branch"
            fi

            # Security feature toggles (default true when omitted)
            enable_codeql_default_setup=$(awk -F': *' '/^enable_codeql_default_setup:/{print $2; exit}' "$config_file" | tr -d '"' | tr -d "'" | tr '[:upper:]' '[:lower:]')
            if [ -z "$enable_codeql_default_setup" ] || [ "$enable_codeql_default_setup" = "null" ]; then
              enable_codeql_default_setup="true"
            fi

            enable_dependabot_alerts=$(awk -F': *' '/^enable_dependabot_alerts:/{print $2; exit}' "$config_file" | tr -d '"' | tr -d "'" | tr '[:upper:]' '[:lower:]')
            if [ -z "$enable_dependabot_alerts" ] || [ "$enable_dependabot_alerts" = "null" ]; then
              enable_dependabot_alerts="true"
            fi

            enable_dependabot_grouped_updates=$(awk -F': *' '/^enable_dependabot_grouped_updates:/{print $2; exit}' "$config_file" | tr -d '"' | tr -d "'" | tr '[:upper:]' '[:lower:]')
            if [ -z "$enable_dependabot_grouped_updates" ] || [ "$enable_dependabot_grouped_updates" = "null" ]; then
              enable_dependabot_grouped_updates="true"
            fi

            enable_dependabot_security_updates=$(awk -F': *' '/^enable_dependabot_security_updates:/{print $2; exit}' "$config_file" | tr -d '"' | tr -d "'" | tr '[:upper:]' '[:lower:]')
            if [ -z "$enable_dependabot_security_updates" ] || [ "$enable_dependabot_security_updates" = "null" ]; then
              enable_dependabot_security_updates="true"
            fi

            manage_dependabot_config="true"
            if [ "$enable_dependabot_security_updates" = "false" ]; then
              manage_dependabot_config="false"
            fi

            echo "Security toggles: codeql=$enable_codeql_default_setup, dependabot_alerts=$enable_dependabot_alerts, dependabot_grouped=$enable_dependabot_grouped_updates, dependabot_security_updates=$enable_dependabot_security_updates"

            # Check if branch already exists
            if gh api "repos/Egoorbis/$repo_name/branches/$BRANCH_NAME" >/dev/null 2>&1; then
              echo "Branch $BRANCH_NAME already exists in $repo_name, checking if PR exists"

              # Check for existing open PR
              PR_COUNT=$(gh pr list --repo "Egoorbis/$repo_name" --head "$BRANCH_NAME" --state open --json number --jq 'length')

              if [ "$PR_COUNT" -gt 0 ]; then
                echo "PR already exists for branch $BRANCH_NAME in $repo_name, skipping"
                continue
              fi

              # Branch exists but no PR - delete branch and recreate
              echo "Branch exists but no PR found, deleting old branch"
              gh api -X DELETE "repos/Egoorbis/$repo_name/git/refs/heads/$BRANCH_NAME" || true
            fi

            # Get the main branch SHA
            MAIN_SHA=$(gh api "repos/Egoorbis/$repo_name/git/ref/heads/main" --jq '.object.sha')
            echo "Main branch SHA: $MAIN_SHA"

            # Repository security settings (managed directly via GitHub APIs)
            CODEQL_DEFAULT_SETUP_STATE=$(gh api "repos/Egoorbis/$repo_name/code-scanning/default-setup" --jq '.state' 2>/dev/null || echo "not-configured")

            DEPENDABOT_ALERTS_ENABLED=false
            if gh api "repos/Egoorbis/$repo_name/vulnerability-alerts" >/dev/null 2>&1; then
              DEPENDABOT_ALERTS_ENABLED=true
            fi

            DEPENDABOT_SECURITY_UPDATES_ENABLED=false
            if gh api "repos/Egoorbis/$repo_name/automated-security-fixes" >/dev/null 2>&1; then
              DEPENDABOT_SECURITY_UPDATES_ENABLED=true
            fi

            # Check if deploy workflow exists in main (if deploy_to_azure is not false)
            DEPLOY_EXISTS=false
            deploy_to_azure=$(grep "^deploy_to_azure:" "$config_file" | awk '{print $2}' || echo "true")

            if [ "$deploy_to_azure" != "false" ]; then
              if gh api "repos/Egoorbis/$repo_name/contents/.github/workflows/vending-machine/deploy.yml?ref=main" >/dev/null 2>&1; then
                DEPLOY_EXISTS=true
                DEPLOY_SHA=$(gh api "repos/Egoorbis/$repo_name/contents/.github/workflows/vending-machine/deploy.yml?ref=main" --jq '.sha')
                echo "Deploy workflow exists in main with SHA: $DEPLOY_SHA"
              fi
            fi

            # Check if Dependabot config exists in main
            DEPENDABOT_EXISTS=false
            if gh api "repos/Egoorbis/$repo_name/contents/.github/dependabot.yml?ref=main" >/dev/null 2>&1; then
              DEPENDABOT_EXISTS=true
              DEPENDABOT_SHA=$(gh api "repos/Egoorbis/$repo_name/contents/.github/dependabot.yml?ref=main" --jq '.sha')
              echo "Dependabot config exists in main with SHA: $DEPENDABOT_SHA"
            fi

            # Check if dependency submission workflow exists in main
            DEP_SUBMISSION_EXISTS=false
            if gh api "repos/Egoorbis/$repo_name/contents/.github/workflows/dependency-submission.yml?ref=main" >/dev/null 2>&1; then
              DEP_SUBMISSION_EXISTS=true
              DEP_SUBMISSION_SHA=$(gh api "repos/Egoorbis/$repo_name/contents/.github/workflows/dependency-submission.yml?ref=main" --jq '.sha')
              echo "Dependency submission workflow exists in main with SHA: $DEP_SUBMISSION_SHA"
            fi

            # Read template files
            DEPLOY_CONTENT=$(cat modules/repository/templates/tf_action.yaml.tftpl | sed 's/\$\$/$/g')
            if [ "$enable_dependabot_grouped_updates" = "false" ]; then
              # Keep Dependabot enabled but strip grouped update rules.
              DEPENDABOT_CONTENT=$(awk '
                /^  - package-ecosystem:/ {
                  in_groups = 0
                  print
                  next
                }
                /^    groups:$/ {
                  in_groups = 1
                  next
                }
                in_groups == 1 {
                  if ($0 ~ /^      /) {
                    next
                  }
                  in_groups = 0
                }
                {
                  print
                }
              ' modules/repository/templates/dependabot.yml.tftpl)
            else
              DEPENDABOT_CONTENT=$(cat modules/repository/templates/dependabot.yml.tftpl)
            fi
            DEP_SUBMISSION_CONTENT=$(cat modules/repository/templates/dependency-submission.yaml.tftpl | sed 's/\$\$/$/g')

            # Compare content with what's in main (if files exist)
            NEEDS_UPDATE=false

            if [ "$deploy_to_azure" != "false" ]; then
              if [ "$DEPLOY_EXISTS" = true ]; then
                EXISTING_DEPLOY=$(gh api "repos/Egoorbis/$repo_name/contents/.github/workflows/vending-machine/deploy.yml?ref=main" --jq '.content' | base64 -d)
                if [ "$EXISTING_DEPLOY" != "$DEPLOY_CONTENT" ]; then
                  echo "Deploy workflow needs update"
                  NEEDS_UPDATE=true
                fi
              else
                echo "Deploy workflow doesn't exist yet"
                NEEDS_UPDATE=true
              fi
            fi

            if [ "$manage_dependabot_config" = "true" ]; then
              if [ "$DEPENDABOT_EXISTS" = true ]; then
                EXISTING_DEPENDABOT=$(gh api "repos/Egoorbis/$repo_name/contents/.github/dependabot.yml?ref=main" --jq '.content' | base64 -d)
                if [ "$EXISTING_DEPENDABOT" != "$DEPENDABOT_CONTENT" ]; then
                  echo "Dependabot config needs update"
                  NEEDS_UPDATE=true
                fi
              else
                echo "Dependabot config doesn't exist yet"
                NEEDS_UPDATE=true
              fi
            else
              if [ "$DEPENDABOT_EXISTS" = true ]; then
                echo "Dependabot config should be removed"
                NEEDS_UPDATE=true
              fi
            fi

            if [ "$DEP_SUBMISSION_EXISTS" = true ]; then
              EXISTING_DEP_SUBMISSION=$(gh api "repos/Egoorbis/$repo_name/contents/.github/workflows/dependency-submission.yml?ref=main" --jq '.content' | base64 -d)
              if [ "$EXISTING_DEP_SUBMISSION" != "$DEP_SUBMISSION_CONTENT" ]; then
                echo "Dependency submission workflow needs update"
                NEEDS_UPDATE=true
              fi
            else
              echo "Dependency submission workflow doesn't exist yet"
              NEEDS_UPDATE=true
            fi

            # Reconcile CodeQL default setup state.
            if [ "$enable_codeql_default_setup" = "true" ]; then
              if [ "$CODEQL_DEFAULT_SETUP_STATE" != "configured" ]; then
                echo "Enabling CodeQL default setup (query suite: default)"
                gh api -X PATCH "repos/Egoorbis/$repo_name/code-scanning/default-setup" \
                  -H "Accept: application/vnd.github+json" \
                  -f state="configured" \
                  -f query_suite="default"
              fi
            else
              if [ "$CODEQL_DEFAULT_SETUP_STATE" = "configured" ]; then
                echo "Disabling CodeQL default setup"
                gh api -X PATCH "repos/Egoorbis/$repo_name/code-scanning/default-setup" \
                  -H "Accept: application/vnd.github+json" \
                  -f state="not-configured"
              fi
            fi

            # Reconcile Dependabot vulnerability alerts.
            if [ "$enable_dependabot_alerts" = "true" ]; then
              if [ "$DEPENDABOT_ALERTS_ENABLED" != "true" ]; then
                echo "Enabling Dependabot vulnerability alerts"
                gh api -X PUT "repos/Egoorbis/$repo_name/vulnerability-alerts" \
                  -H "Accept: application/vnd.github+json"
              fi
            else
              if [ "$DEPENDABOT_ALERTS_ENABLED" = "true" ]; then
                echo "Disabling Dependabot vulnerability alerts"
                gh api -X DELETE "repos/Egoorbis/$repo_name/vulnerability-alerts" \
                  -H "Accept: application/vnd.github+json"
              fi
            fi

            # Reconcile Dependabot automated security fixes.
            if [ "$enable_dependabot_security_updates" = "true" ]; then
              if [ "$DEPENDABOT_SECURITY_UPDATES_ENABLED" != "true" ]; then
                echo "Enabling Dependabot security updates"
                gh api -X PUT "repos/Egoorbis/$repo_name/automated-security-fixes" \
                  -H "Accept: application/vnd.github+json"
              fi
            else
              if [ "$DEPENDABOT_SECURITY_UPDATES_ENABLED" = "true" ]; then
                echo "Disabling Dependabot security updates"
                gh api -X DELETE "repos/Egoorbis/$repo_name/automated-security-fixes" \
                  -H "Accept: application/vnd.github+json"
              fi
            fi

            if [ "$NEEDS_UPDATE" = false ]; then
              echo "All workflows are up to date in $repo_name, skipping"
              continue
            fi

            echo "Creating branch and updating workflows for $repo_name"

            # Create new branch
            gh api -X POST "repos/Egoorbis/$repo_name/git/refs" \
              -f ref="refs/heads/$BRANCH_NAME" \
              -f sha="$MAIN_SHA"

            # Update or create deploy workflow (if deploy_to_azure is not false)
            if [ "$deploy_to_azure" != "false" ]; then
              if [ "$DEPLOY_EXISTS" = true ]; then
                echo "Updating deploy workflow"
                gh api -X PUT "repos/Egoorbis/$repo_name/contents/.github/workflows/vending-machine/deploy.yml" \
                  -f message="chore: update caller workflow [skip ci]" \
                  -f content="$(echo "$DEPLOY_CONTENT" | base64 -w 0)" \
                  -f branch="$BRANCH_NAME" \
                  -f sha="$DEPLOY_SHA"
              else
                echo "Creating deploy workflow"
                gh api -X PUT "repos/Egoorbis/$repo_name/contents/.github/workflows/vending-machine/deploy.yml" \
                  -f message="chore: bootstrap caller workflow [skip ci]" \
                  -f content="$(echo "$DEPLOY_CONTENT" | base64 -w 0)" \
                  -f branch="$BRANCH_NAME"
              fi
            fi

            # Create/update/remove Dependabot config according to config toggle.
            if [ "$manage_dependabot_config" = "true" ]; then
              if [ "$DEPENDABOT_EXISTS" = true ]; then
                echo "Updating Dependabot config"
                gh api -X PUT "repos/Egoorbis/$repo_name/contents/.github/dependabot.yml" \
                  -f message="chore: update Dependabot configuration [skip ci]" \
                  -f content="$(echo "$DEPENDABOT_CONTENT" | base64 -w 0)" \
                  -f branch="$BRANCH_NAME" \
                  -f sha="$DEPENDABOT_SHA"
              else
                echo "Creating Dependabot config"
                gh api -X PUT "repos/Egoorbis/$repo_name/contents/.github/dependabot.yml" \
                  -f message="chore: configure Dependabot with grouped security updates [skip ci]" \
                  -f content="$(echo "$DEPENDABOT_CONTENT" | base64 -w 0)" \
                  -f branch="$BRANCH_NAME"
              fi
            else
              if [ "$DEPENDABOT_EXISTS" = true ]; then
                echo "Removing Dependabot config"
                gh api -X DELETE "repos/Egoorbis/$repo_name/contents/.github/dependabot.yml" \
                  -f message="chore: disable Dependabot config [skip ci]" \
                  -f branch="$BRANCH_NAME" \
                  -f sha="$DEPENDABOT_SHA"
              fi
            fi

            # Update or create dependency submission workflow
            if [ "$DEP_SUBMISSION_EXISTS" = true ]; then
              echo "Updating dependency submission workflow"
              gh api -X PUT "repos/Egoorbis/$repo_name/contents/.github/workflows/dependency-submission.yml" \
                -f message="chore: update dependency submission workflow [skip ci]" \
                -f content="$(echo "$DEP_SUBMISSION_CONTENT" | base64 -w 0)" \
                -f branch="$BRANCH_NAME" \
                -f sha="$DEP_SUBMISSION_SHA"
            else
              echo "Creating dependency submission workflow"
              gh api -X PUT "repos/Egoorbis/$repo_name/contents/.github/workflows/dependency-submission.yml" \
                -f message="chore: add automatic dependency submission workflow [skip ci]" \
                -f content="$(echo "$DEP_SUBMISSION_CONTENT" | base64 -w 0)" \
                -f branch="$BRANCH_NAME"
            fi

            # Create pull request
            echo "Creating pull request"
            gh pr create \
              --repo "Egoorbis/$repo_name" \
              --head "$BRANCH_NAME" \
              --base main \
              --title "chore: bootstrap workflow files" \
              --body "Automated PR created by project vending to add or update bootstrap workflow files."

            echo "Successfully created PR for $repo_name"
          done
